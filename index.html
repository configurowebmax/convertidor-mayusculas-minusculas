<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor de Mayúsculas y Minúsculas Gratis | ConfiguroWeb</title>
    <meta name="description" content="Convierte texto a mayusculas, minusculas, tipo oracion o tipo titulo. Cuenta palabras, caracteres y copia el resultado.">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold text-rose-600">Configuro<span class="text-slate-900">Web</span></span>
            <a href="https://configuroweb.com/tag/gratis" class="text-sm font-medium text-slate-600 hover:text-rose-600">← Volver a Apps Gratuitas</a>
        </div>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-8 flex-grow w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">Convertidor de Mayúsculas y Minúsculas</h1>
            <p class="text-slate-500 text-sm">Transforma tu texto a diferentes formatos al instante.</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-4">
            <button onclick="convert('upper')" class="bg-rose-600 hover:bg-rose-500 text-white text-xs font-semibold py-2.5 rounded-xl cursor-pointer">MAYÚS</button>
            <button onclick="convert('lower')" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-semibold py-2.5 rounded-xl cursor-pointer">minús</button>
            <button onclick="convert('title')" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-semibold py-2.5 rounded-xl cursor-pointer">Tipo Título</button>
            <button onclick="convert('sentence')" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-semibold py-2.5 rounded-xl cursor-pointer">Tipo oración</button>
            <button onclick="copyText()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold py-2.5 rounded-xl cursor-pointer">📋 Copiar</button>
        </div>

        <textarea id="text" rows="10" placeholder="Escribe o pega tu texto aquí..." class="w-full px-4 py-3 border border-slate-300 rounded-xl text-sm resize-none focus:outline-none focus:border-rose-500 mb-4"></textarea>

        <div class="grid grid-cols-3 gap-3 text-center">
            <div class="bg-white border border-slate-200 rounded-xl p-4">
                <p id="charCount" class="text-2xl font-extrabold text-rose-600">0</p>
                <p class="text-xs text-slate-500 uppercase mt-1">Caracteres</p>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-4">
                <p id="wordCount" class="text-2xl font-extrabold text-rose-600">0</p>
                <p class="text-xs text-slate-500 uppercase mt-1">Palabras</p>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-4">
                <p id="lineCount" class="text-2xl font-extrabold text-rose-600">0</p>
                <p class="text-xs text-slate-500 uppercase mt-1">Líneas</p>
            </div>
        </div>
    </main>
    <footer class="bg-white border-t border-slate-200 mt-12">
        <div class="max-w-5xl mx-auto px-4 py-6 text-center text-xs text-slate-400">&copy; 2026 ConfiguroWeb.</div>
    </footer>
    <script>
        const text = document.getElementById('text');
        function updateStats() {
            const v = text.value;
            document.getElementById('charCount').innerText = v.length;
            document.getElementById('wordCount').innerText = v.trim() ? v.trim().split(/\s+/).length : 0;
            document.getElementById('lineCount').innerText = v ? v.split('\n').length : 0;
        }
        function convert(type) {
            let v = text.value;
            if (type === 'upper') text.value = v.toUpperCase();
            else if (type === 'lower') text.value = v.toLowerCase();
            else if (type === 'title') text.value = v.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
            else if (type === 'sentence') text.value = v.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase());
            updateStats();
        }
        function copyText() {
            text.select();
            navigator.clipboard.writeText(text.value);
        }
        text.addEventListener('input', updateStats);
    </script>
</body>
</html>
